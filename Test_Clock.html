<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analog Clock</title>
<style>
  .ClockContainer {
      align-items: center;
      display: flex;
      flex-direction: column;
      font-family: system-ui, Arial, sans-serif;
      left: 50px;
      position: absolute;
      top: 100px;
      user-select: none;
      z-index: 3;
    }
    .Analog-Bigclock {
      align-self: center;
      cursor: move;
      flex-shrink: 0;
      height: var(--clock-size);
      margin: 0 auto;
      width: var(--clock-size);
    }
    .Analog {
      background: radial-gradient(circle at 50% 50%, #f8f9fa 0%, #e9ecef 100%);
      border: 1px solid #fff !important;
      border-radius: 50% !important;
      box-shadow: inset 0 0 25px rgba(0,0,0,0.08), 0 15px 35px rgba(0,0,0,0.25);
      height: 100%;
      width: 100%;
    }
    .Analog-Second-Hand,
    .Analog-Minute-Hand,
    .Analog-Hour-Hand {
      stroke-linecap: round;
      transform-origin: 50% 50%;
    }
    .Analog-Second-Hand {
      transform: rotate(var(--secondDeg, 0deg));
    }
    .Analog-Minute-Hand {
      transform: rotate(var(--minuteDeg, 0deg));
    }
    .Analog-Hour-Hand {
      transform: rotate(var(--hourDeg, 0deg));
    }
    .Analog-Second-Hand {
      fill: #e74c3c;
      stroke: #e74c3c;
      stroke-width: 1;
    }
    .Analog-Minute-Hand {
      fill: #34495e;
      stroke: #34495e;
      stroke-width: 2;
    }
    .Analog-Hour-Hand {
      fill: #2c3e50;
      stroke: #2c3e50;
      stroke-width: 3;
    }
    .Analog-Number {
      fill: #2c3e50;
      font-family: system-ui, Arial, sans-serif;
      font-size: 6.8px;
      font-weight: 700;
      paint-order: stroke fill;
      stroke: none;
    }
    .Analog-CenterCutout {
      fill: #2c3e50;
      stroke: white;
      stroke-width: 3;
    }
    .Analog-Bigclock.dark .Analog {
      background: radial-gradient(circle at 50% 50%, #2c3e50 0%, #1a252f 100%);
      border-color: #ecf0f1;
    }
    .Analog-Bigclock.dark .Analog-Second-Hand {
      fill: #ff6b6b;
      stroke: #ff6b6b;
    }
    .Analog-Bigclock.dark .Analog-Minute-Hand,
    .Analog-Bigclock.dark .Analog-Hour-Hand {
      fill: #ecf0f1;
      stroke: #ecf0f1;
    }
    .Analog-Bigclock.dark .Analog-Number {
      fill: #fff;
    }
    .Analog-Bigclock.dark .Analog-CenterCutout {
      fill: #ecf0f1;
      stroke: #2c3e50;
    }
    .Analog-AMPMText {
      fill: #0078d7;
      font-size: 7px;
      font-weight: 300;
    }
    .Analog-Bigclock.dark .Analog-AMPMText {
      fill: #fff;
    }
    .Analog-AMPMBorder {
      fill: none;
      stroke: #0078d7;
      stroke-width: 0.25;
    }
    .Analog-Bigclock.dark .Analog-AMPMBorder {
      fill: none;
      stroke: #0078d7;
      stroke-width: 0.25;
    }
    .ControlsRow {
    }
    .scaler-controls {
      align-items: center;
      background: #2A3A4B;
      border: none;
      border-radius: 8px;
      cursor: default;
      display: flex;
      gap: 12px;
      height: 32px;
      justify-content: center;
      margin-top: 4px;
      padding: 0px 0px 2px 0px;
      width: 364px;
    }
    .ClockThemeToggle,
    .ClockSecondToggle,
    .scaler-info,
    .am-pm {
	  background: transparent;
      border: none;
      cursor: pointer;
      margin: 0px;
      padding: 0px;
      position: relative;
      top: 3px;
      width: 32px;
    }
    .ClockThemeToggle {
    }
    .scaler-info {
    }
    .scaler-reset {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      margin: 0px;
      padding: 0;
      position: relative;
      top: 1px;
    }
    .scaler-btn {
      background: none;
      border: none;
      color: #ffffff;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      opacity: .7;
      padding: 0px 4px;
    }
    .scaler-btn:hover {
      opacity: 1;
    }
    .scaler-text {
      background: rgba(255,255,255,.1);
      border: 1px solid #666;
      border-radius: 14px;
      color: #5294e2;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      margin-top: 0px;
      min-width: 32px;
      padding: 1px 2px 0px 0px;
    }
    .ClockThemeToggle,
    .ClockSecondToggle,
    .scaler-info,
    .am-pm,
    .scaler-reset {
      color: #ffffff;
      opacity: .7;
    }
    .ClockThemeToggle:hover,
    .ClockSecondToggle:hover,
    .scaler-info:hover,
    .am-pm:hover,
    .scaler-reset:hover {
      cursor: pointer;
      opacity: 1;
    }
    #spacer3 {
      color: #666;
	  margin: 0px 6px 0px 0px;
      opacity: 1;
      pointer-events: none;
      text-align: center;
    }
    .Analog-Info {
      align-items: center;
      background: #2A3A4B;
      border-radius: 0px 0px 8px 8px;
      cursor: default;
      display: inline-flex;
      justify-content: center;
      margin-top: -6px;
      padding: 6px 0px 2px 0px;
	  text-align: center;
      width: 364px;
    }
    .Analog-CalendarText {
      display: inline-block;
      color: #fff;
      font-family: monospace;
      font-size: 16px;
      white-space: nowrap;
    }
    .ClockThemeToggle:hover,
    .scaler-reset:hover,
    .scaler-info:hover {
      color: #ffffff;
    }
    .scaler-text:hover,
    .scaler-text:focus-within {
      border-color: #ffffff;
      color: #ffffff;
    }
    .scaler-text::-webkit-inner-spin-button,
    .scaler-text::-webkit-outer-spin-button,
    .hidden {
      display: none;
    }
</style>
</head>
<body>

<script>
  const _aURL = 'https://raw.githubusercontent.com/Razzano/My_Images/master/';
  const _Icon = {
    ampm22: _aURL + 'AMPM2.png',
    calendar16: _aURL + 'calendar16.png',
    calendar22: _aURL + 'calendar22.png',
    calendar32D: _aURL + 'calendar32D.png',
    clock16: _aURL + 'clock16.png',
    clock22: _aURL + 'clock22.png',
    clock22L: _aURL + 'clock22L.png',
    clock26: _aURL + 'clock26.png',
    moon16: _aURL + 'moon16.png',
    moon22: _aURL + 'moon22.png',
    sun16: _aURL + 'sun16.png',
    sun22: _aURL + 'sun22.png',
  };
  const SVG_NS = "http://www.w3.org/2000/svg";
  const SVG_TAGS = new Set([
    "svg","g","path","circle","text","line","rect","polyline","polygon",
    "foreignObject","defs","marker","stop","use"
  ]);
  const $el = (tag, props = {}, ...children) => {
    const isSVG = SVG_TAGS.has(tag);
    const el = isSVG
      ? document.createElementNS(SVG_NS, tag)
      : document.createElement(tag);
    for (const [key, value] of Object.entries(props)) {
      if (value == null) continue;
      if (key.startsWith("on") && typeof value === "function") {
        el.addEventListener(key.slice(2).toLowerCase(), value);
        continue;
      }
      if (key === "className" || key === "class") {
        el.setAttribute("class", Array.isArray(value) ? value.join(" ") : value);
        continue;
      }
      if (key === "style" && typeof value === "object") {
        Object.assign(el.style, value);
        continue;
      }
      if (key === "textContent") {
        el.textContent = value;
        continue;
      }
      if (isSVG) {
        el.setAttribute(key, value);
        continue;
      }
      if (key in el) {
        el[key] = value;
      } else {
        el.setAttribute(key, value);
    } }
    children.flat(Infinity).forEach(child => {
      if (child == null) return;
      el.appendChild(child instanceof Node ? child : document.createTextNode(child));
    });
    return el;
  };
  const makeDraggable = (elmnt, storageKey, dragSelector = null) => {
    let startX, startY, startLeft, startTop;
    let isDragging = false;
    const dragMouseDown = (e) => {
      if (dragSelector) {
        if (!e.target.closest(dragSelector)) return;
      } else {
        if (e.target.closest('button,input,select,textarea,img,span')) return;
      }
      e.preventDefault();
      e.stopImmediatePropagation();
      if (elmnt.style.position !== 'fixed') {
        const rect = elmnt.getBoundingClientRect();
        elmnt.style.position = 'fixed';
        elmnt.style.left = rect.left + 'px';
        elmnt.style.top = rect.top + 'px';
        elmnt.style.transform = 'none';
        elmnt.classList.add('dragged');
      }
      startX = e.clientX;
      startY = e.clientY;
      startLeft = parseFloat(elmnt.style.left) || 0;
      startTop = parseFloat(elmnt.style.top) || 0;
      isDragging = true;
      document.addEventListener('mousemove', elementDrag, { passive: false });
      document.addEventListener('mouseup', closeDragElement, { once: true });
    };
    const elementDrag = (e) => {
      if (!isDragging) return;
      e.preventDefault();
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      let newLeft = startLeft + dx;
      let newTop = startTop + dy;
      newLeft = Math.max(
        0,
        Math.min(
          newLeft,
          window.innerWidth - elmnt.offsetWidth
        )
      );
      newTop = Math.max(
        0,
        Math.min(
          newTop,
          window.innerHeight - elmnt.offsetHeight
        )
      );
      elmnt.style.left = `${newLeft}px`;
      elmnt.style.top = `${newTop}px`;
    };
    const closeDragElement = () => {
      isDragging = false;
      document.removeEventListener('mousemove', elementDrag);
      localStorage.setItem(storageKey + '_top', elmnt.style.top);
      localStorage.setItem(storageKey + '_left', elmnt.style.left);
      console.log('✅ Position saved for', elmnt.id);
    };
    elmnt.style.cursor = 'move';
    elmnt.style.userSelect = 'none';
    elmnt.addEventListener('mousedown', dragMouseDown);
  };
  const restorePosition = (el, key) => {
    const savedTop = localStorage.getItem(key + '_top');
    const savedLeft = localStorage.getItem(key + '_left');
    if (savedTop && savedLeft) {
        el.style.top = savedTop;
        el.style.left = savedLeft;
        el.style.transform = 'none';
    }
  };
  const DAY_ABBR = ['Sun.','Mon.','Tue.','Wed.','Thu.','Fri.','Sat.'];
  const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTH_ABBR = ['Jan.','Feb.','Mar.','Apr.','May','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'];
  const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  // ============ Analog Clock ============
  const getClock = () => {
    if (document.getElementById('analogClockContainer')) return;
    const smoothSecondHand = localStorage.getItem('smoothSecondHand') !== 'false';
	localStorage.setItem('smoothSecondHand', smoothSecondHand);
    const ticks = [];
    const hourNumbers = [];
    const spacer3 = $el('span', {id: 'spacer3', class: 'spacerX', textContent: '|'});
    for (let i = 0; i < 60; i++) {
      const angleDeg = i * 6 - 90;
      const rad = angleDeg * Math.PI / 180;
      const isHourMark = (i % 5 === 0);
      const innerRadius = isHourMark ? 42 : 44.5;
      const outerRadius = 47;
      ticks.push(
        $el('line', {
          x1: 50 + innerRadius * Math.cos(rad),
          y1: 50 + innerRadius * Math.sin(rad),
          x2: 50 + outerRadius * Math.cos(rad),
          y2: 50 + outerRadius * Math.sin(rad),
          stroke: isHourMark ? '#2c3e50' : '#7f8c8d',
          strokeWidth: isHourMark ? '1.5' : '0.75',
          strokeLinecap: 'round'
        })
      );
    }
    for (let i = 0; i < 12; i++) {
      const hour = i === 0 ? 12 : i;
      const angleDeg = i * 30 - 90;
      const rad = angleDeg * Math.PI / 180;
      const radius = 37;
      hourNumbers.push($el('text', {
        className: 'Analog-Number',
        x: 50 + radius * Math.cos(rad),
        y: 50.8 + radius * Math.sin(rad),
        textContent: hour,
        'text-anchor': 'middle',
        'dominant-baseline': 'middle'
      }));
    }
    const calendarText = $el('div', {
      className: 'Analog-CalendarText'
    });
    const ampmBorder = $el('rect', {
      className: 'Analog-AMPMBorder',
      x: 44,
      y: 75,
      width: 12,
      height: 7,
      rx: 2,
      ry: 2
    });
    const ampmText = $el('text', {
      className: 'Analog-AMPMText',
      x: 45,
      y: 81,
      textAnchor: 'middle',
      dominantBaseline: 'middle'
    });
    const svg = $el('svg', { className: 'Analog', viewBox: '0 0 100 100' },
      $el('circle', {
        cx: 50,
        cy: 50,
        r: 47,
        fill: 'none',
        stroke: '#ccc',
        strokeWidth: 2
      }),
      ...ticks,
      ...hourNumbers,
      ampmBorder,
      ampmText,
      $el('line', { className: 'Analog-Hour-Hand', x1: 50, y1: 50, x2: 50, y2: 30 }),
      $el('line', { className: 'Analog-Minute-Hand', x1: 50, y1: 50, x2: 50, y2: 22 }),
      $el('line', { className: 'Analog-Second-Hand', x1: 50, y1: 55, x2: 50, y2: 15 }),
      $el('circle', { className: 'Analog-CenterCutout', cx: 50, cy: 50, r: 3 })
    );
    const Clock = $el('div', { className: 'Analog-Bigclock' }, svg);
	const ampmView = localStorage.getItem('ampmView') === 'true';
    ampmBorder.style.display = ampmView ? '' : 'none';
    ampmText.style.display = ampmView ? '' : 'none';
    const BASE_SIZE = 314;
    let currentPercent = 100;
    const percentageDisplay = $el('input', {
      className: 'scaler-text',
      type: 'number',
      value: '100',
      min: '30',
      max: '200',
      step: '1',
      title: 'Manually Enter Percentage:\n • Min. 30% = 90px Ø\n • Reset 100% = 300px Ø\n • Max. 200% = 600px Ø',
      oninput(e) {
        const val = e.target.value;
        if (val === '') return;
        const num = parseInt(val, 10);
        if (!isNaN(num)) {
          setClockPercentage(num);
      } }
    });
    const setClockPercentage = (percent) => {
      currentPercent = Math.max(30, Math.min(200, percent));
      const pixelSize = Math.round((currentPercent / 100) * BASE_SIZE);
      Clock.style.setProperty('--clock-size', pixelSize + 'px');
      percentageDisplay.value = String(currentPercent);
      localStorage.setItem('clockSizePercent', currentPercent);
    };
    const moonImg = $el('img', {
      id: 'moonImg',
      src: _Icon.moon22
    });
    const themeBtn = $el('button', {
      className: 'ClockThemeToggle',
      title: 'Toggle Between Dark/Light Theme'
    }, moonImg);
    const applyTheme = (dark) => {
      Clock.classList.toggle('dark', dark);
      moonImg.src = dark ? _Icon.sun22 : _Icon.moon22;
    };
    applyTheme(localStorage.getItem('clockDarkTheme') === 'true');
    themeBtn.onclick = () => {
      const dark = !Clock.classList.contains('dark');
      applyTheme(dark);
      localStorage.setItem('clockDarkTheme', String(dark));
    };
    const darkTheme = localStorage.getItem('clockDarkTheme') === 'true';
    applyTheme(darkTheme);
    const clockImg = $el('img', {
      id: 'clockImg',
      src: _Icon.clock22L
    });
    const secondHandBtn = $el('button', {
      className: 'ClockSecondToggle',
      title: 'Toggle Between Smooth/Tick Second Hand Movement'
    }, clockImg);
    const setSecondMode = (smooth) => {
      localStorage.setItem('smoothSecondHand', smooth);
    };
    secondHandBtn.onclick = () => {
      const smooth = localStorage.getItem('smoothSecondHand') === 'true';
      localStorage.setItem('smoothSecondHand', String(!smooth));
      location.reload();
    };
    const calendarImg = $el('img', {
      id: 'calendarImg',
      src: _Icon.calendar22
    });
    const clockInfo = $el( 'div', {
	     className: 'Analog-Info' },
      calendarText
    );
    const calendarBtn = $el('button', {
      className: 'scaler-info',
      title: 'Show/Hide Calendar Info',
      onclick() {
        clockInfo.classList.toggle('hidden');
        localStorage.setItem('calendarInfo', !clockInfo.classList.contains('hidden'));
      }
    }, calendarImg);
	const ampmImg = $el('img', {
      id: 'ampmImg',
      src: _Icon.ampm22
    });
    const ampmBtn = $el('button', {
      className: 'am-pm',
      title: 'Show/Hide Clock AMPM',
      onclick() {
        const current = localStorage.getItem('ampmView') === 'true';
        const visible = !current;
        ampmBorder.style.display = visible ? '' : 'none';
        ampmText.style.display = visible ? '' : 'none';
        localStorage.setItem('ampmView', String(visible));
      }
    }, ampmImg);
    const scalerControls = $el('div', { className: 'scaler-controls' },
      themeBtn,
      secondHandBtn,
      calendarBtn,
	  ampmBtn,
      spacer3,
      $el('button', {
        className: 'scaler-reset',
        textContent: 'Reset',
        title: 'Reset To 100%',
        onclick: () => setClockPercentage(100)
      }),
      $el('button', {
        className: 'scaler-btn',
        textContent: '–',
        title: 'Scale Down In 5% Increments',
        onclick: () => setClockPercentage(currentPercent - 5)
      }),
      percentageDisplay,
      $el('button', {
        className: 'scaler-btn',
        textContent: '+',
        title: 'Scale Up In 5% Increments',
        onclick: () => setClockPercentage(currentPercent + 5)
      })
    );
    const savedPercent = parseInt(localStorage.getItem('clockSizePercent'), 10) || 100;
    setClockPercentage(savedPercent);
	const controlsRow = $el(
      'div',
      { className: 'ControlsRow' },
      scalerControls
    );
    const container = $el(
      'div',
      { id: 'analogClockContainer', className: 'ClockContainer' },
      Clock,
      controlsRow,
      clockInfo
    );
    makeDraggable(container, 'analogClockContainer', '.Analog-Bigclock');
    restorePosition(container, 'analogClockContainer');
    const rect = container.getBoundingClientRect();
    if (rect.right < 0 || rect.bottom < 0 || rect.left > window.innerWidth || rect.top > window.innerHeight) {
      container.style.left = '20px';
      container.style.top = '20px';
    }
    document.body.appendChild(container);
    let displayedSecondDeg = 0;
    const updateClock = () => {
      const now = new Date();
      const dy = now.getDay(), dt = now.getDate(), mth = now.getMonth(), yr = now.getFullYear();
      const dayAbbr = DAY_ABBR[dy], dayFull = DAY_FULL[dy], monthAbbr = MONTH_ABBR[mth], monthFull = MONTH_FULL[mth];
      const suffix = ['th', 'st', 'nd', 'rd'][(dt % 10 > 3 || Math.floor(dt / 10) === 1 ? 0 : dt % 10)] || 'th';
      const ordinal = dt + suffix;
      const h12 = String(now.getHours() % 12 || 12);
      const min = String(now.getMinutes()).padStart(2, '0');
      const seconds = smoothSecondHand ? now.getSeconds() + now.getMilliseconds() / 1000 : now.getSeconds();
      const secondDeg = seconds * 6;
      const minuteDeg = now.getMinutes() * 6 + seconds * 0.1;
      const hourDeg = (now.getHours() % 12) * 30 + now.getMinutes() * 0.5 + seconds * (0.5 / 60);
      let targetDeg = secondDeg;
      if (targetDeg < displayedSecondDeg - 180) targetDeg += 360;
      displayedSecondDeg = targetDeg;
      Clock.style.setProperty('--secondDeg', `${displayedSecondDeg}deg`);
      Clock.style.setProperty('--minuteDeg', `${minuteDeg}deg`);
      Clock.style.setProperty('--hourDeg', `${hourDeg}deg`);
      ampmText.textContent = now.getHours() < 12 ? 'AM' : 'PM';
      calendarText.textContent = `${dayFull} ⇒ ${monthFull} ${ordinal}, ${yr}\u3000${h12}:${min}`;
    };
    if (smoothSecondHand) {
      const tick = () => {
        updateClock();
        requestAnimationFrame(tick);
      };
      tick();
    } else {
      updateClock();
      setInterval(updateClock, 1000);
    }
    const showCalendarInfo = localStorage.getItem('calendarInfo');
    if (!showCalendarInfo) {
      clockInfo.classList.add('hidden');
    }
  };
  const init = () => {
    document.removeEventListener('DOMContentLoaded', init);
	getClock();
  };
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && localStorage.getItem('analogClock')) {
      if (!document.getElementById('analogClockContainer')) {
        getClock();
    } }
  });
  window.addEventListener('pageshow', () => {
    if (localStorage.getItem('analogClock') && !document.getElementById('analogClockContainer')) {
      getClock();
    }
  });
  if (document.readyState === "loading") {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
